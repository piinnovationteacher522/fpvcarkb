<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>車輛交互系統介面</title>
  
  <!-- 引入 Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- 自定義動畫樣式 -->
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInFromRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spin-reverse {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }

    /* 俯視角：路面動態流動效果 */
    @keyframes roadScrollFwd {
      from { stroke-dashoffset: 120; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes roadScrollBwd {
      from { stroke-dashoffset: -120; }
      to { stroke-dashoffset: 0; }
    }
    
    .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    .animate-slide-in { animation: slideInFromRight 0.5s ease-out forwards; }

    /* 車輪轉向過渡效果 */
    .steer-transition { transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
    
    /* 車門動畫過渡效果 */
    .door-transition { transition: transform 0.5s ease-in-out; }
    
    /* 俯視角：路面流動 class */
    .road-lines { 
      stroke-dasharray: 60 60; 
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .road-moving-fwd .road-lines {
      opacity: 0.6;
      animation: roadScrollFwd 0.4s linear infinite;
    }
    .road-moving-bwd .road-lines {
      opacity: 0.6;
      animation: roadScrollBwd 0.6s linear infinite;
    }
  </style>
</head>
<body class="w-full h-screen bg-slate-950 text-slate-100 font-sans overflow-hidden flex flex-col selection:bg-cyan-900">

  <!-- 頂部狀態列 -->
  <header class="flex justify-between items-center px-8 py-4 bg-slate-900/50 backdrop-blur-md border-b border-slate-800/50 z-10">
    <div class="flex items-center space-x-4">
      <i data-lucide="clock" class="w-5 h-5 text-cyan-400"></i>
      <span id="clock-display" class="text-xl font-medium tracking-wider">--:--</span>
      <span class="text-sm text-slate-400 ml-4">24°C 外界溫度</span>
    </div>
    <div class="flex items-center space-x-6">
      <div class="flex items-center space-x-2 text-cyan-400">
        <i data-lucide="unlock" class="w-4 h-4"></i>
        <span class="text-sm font-medium">車輛已解鎖</span>
      </div>
      <div class="flex items-center space-x-2 bg-slate-800 px-3 py-1 rounded-full transition-colors duration-300" id="driver-status-bg">
        <span id="status-driver" class="text-sm font-medium">駕駛者: Pi Innovation</span>
      </div>
    </div>
  </header>

  <!-- 主要內容區 -->

         主頁視圖 (Home View)
         ========================================== -->

      <!-- 擬真車輛側視圖 SVG -->

        <!-- 車底陰影 -->
        <div class="absolute bottom-4 left-1/2 -translate-x-1/2 w-4/5 h-12 bg-black/60 blur-xl rounded-[100%] transition-all duration-700 group-hover:bg-cyan-900/40"></div>
        <!-- 環境光反射 -->
        <div class="absolute bottom-12 left-1/2 -translate-x-1/2 w-3/4 h-8 bg-cyan-500/10 blur-2xl rounded-[100%]"></div>
        
        <svg viewBox="0 0 800 300" class="w-full h-full drop-shadow-2xl transition-transform duration-700 group-hover:scale-105 z-10">

            <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#e2e8f0" />
              <stop offset="50%" stop-color="#94a3b8" />
              <stop offset="100%" stop-color="#475569" />
            </linearGradient>
            <linearGradient id="glassGradient" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#020617" />
              <stop offset="40%" stop-color="#0f172a" />
              <stop offset="100%" stop-color="#1e293b" />
            </linearGradient>
            <radialGradient id="tireGradient" cx="50%" cy="50%" r="50%">

              <stop offset="100%" stop-color="#1e293b" />
            </radialGradient>
            <linearGradient id="rimGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#e2e8f0" />
              <stop offset="100%" stop-color="#64748b" />
            </linearGradient>
          </defs>

          <path d="M 120 220 C 120 200, 130 180, 160 170 L 200 160 C 250 160, 270 120, 310 95 C 350 70, 450 65, 500 75 C 560 85, 600 110, 620 130 C 650 150, 680 155, 710 165 C 730 170, 740 190, 740 210 C 740 230, 730 240, 710 240 L 140 240 C 130 240, 120 230, 120 220 Z" fill="url(#bodyGradient)" />
          <path d="M 315 95 C 350 70, 440 68, 490 78 C 520 85, 570 115, 590 130 L 450 130 L 380 130 L 260 145 Z" fill="url(#glassGradient)" stroke="#334155" stroke-width="2"/>
          <path d="M 430 70 L 410 130" stroke="#020617" stroke-width="12" />
          <path d="M 130 230 L 720 230 L 710 245 L 140 245 Z" fill="#1e293b" />
          <path d="M 140 245 L 710 245 L 700 250 L 150 250 Z" fill="#0f172a" />
          
          <path d="M 280 142 L 260 230 M 410 130 L 410 235 M 570 128 L 560 230" stroke="#475569" stroke-width="2" fill="none" opacity="0.6"/>
          <rect x="360" y="145" width="25" height="5" rx="2" fill="#94a3b8" />
          <rect x="520" y="142" width="25" height="5" rx="2" fill="#94a3b8" />

          <path d="M 170 240 A 55 55 0 0 1 280 240" fill="#0f172a" />
          <path d="M 550 240 A 55 55 0 0 1 660 240" fill="#0f172a" />

          <circle cx="225" cy="240" r="45" fill="url(#tireGradient)" />
          <circle cx="225" cy="240" r="30" fill="url(#rimGradient)" />
          <path d="M 225 210 L 225 270 M 195 240 L 255 240 M 204 219 L 246 261 M 204 261 L 246 219" stroke="#334155" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
          <circle cx="225" cy="240" r="8" fill="#0f172a" />

          <circle cx="605" cy="240" r="45" fill="url(#tireGradient)" />
          <circle cx="605" cy="240" r="30" fill="url(#rimGradient)" />
          <path d="M 605 210 L 605 270 M 575 240 L 635 240 M 584 219 L 626 261 M 584 261 L 626 219" stroke="#334155" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
          <circle cx="605" cy="240" r="8" fill="#0f172a" />

          <path d="M 710 170 L 735 180 L 730 195 L 705 185 Z" fill="#fef08a" />
          <path d="M 715 175 L 735 182 L 730 190 L 710 182 Z" fill="#ffffff" filter="blur(2px)"/>
          <path d="M 125 185 L 140 180 L 145 195 L 125 205 Z" fill="#ef4444" />
          <path d="M 125 190 L 140 185 L 142 195 L 125 200 Z" fill="#fca5a5" filter="blur(2px)"/>
          <path d="M 160 170 C 250 160, 270 120, 310 95 C 350 70, 450 65, 500 75 C 560 85, 600 110, 620 130 L 590 135 C 570 120, 520 90, 490 85 C 440 75, 350 80, 315 105 C 275 130, 255 168, 165 178 Z" fill="#ffffff" opacity="0.2"/>
        </svg>
      </div>

      <!-- 電量資訊與預估續航顯示 -->
      <div class="flex space-x-16 mb-16">
        <div class="flex flex-col items-center bg-slate-900/60 p-8 rounded-3xl border border-slate-800 backdrop-blur-sm w-64 shadow-2xl">
          <div class="flex items-center space-x-3 mb-4 text-cyan-400">
            <i data-lucide="zap" class="w-8 h-8"></i>
            <span class="text-xl font-medium tracking-wider">剩餘電量</span>
          </div>
          <div class="text-6xl font-light tracking-tight mb-4 text-white">82<span class="text-3xl text-slate-400 ml-1">%</span></div>
          <div class="w-full h-3 bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full bg-gradient-to-r from-cyan-600 to-cyan-400 rounded-full shadow-[0_0_10px_#06b6d4]" style="width: 82%;"></div>
          </div>
        </div>

        <div class="flex flex-col items-center bg-slate-900/60 p-8 rounded-3xl border border-slate-800 backdrop-blur-sm w-64 shadow-2xl">
          <div class="flex items-center space-x-3 mb-4 text-emerald-400">
            <i data-lucide="battery-charging" class="w-8 h-8"></i>
            <span class="text-xl font-medium tracking-wider">預估續航</span>
          </div>
          <div class="text-6xl font-light tracking-tight mb-2 text-white">
            415<span class="text-3xl text-slate-400 ml-2">km</span>
          </div>
          <div class="text-slate-400 text-sm mt-2">基於近期駕駛習慣</div>
        </div>
      </div>

      <!-- 操作按鈕區塊 -->
      <div class="flex space-x-6">
        <!-- 進入駕駛頁面按鈕 -->
        <button onclick="switchView('drive')" class="group relative px-8 py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl flex items-center space-x-4 border border-emerald-500/50 transition-all duration-300 shadow-lg hover:shadow-[0_0_20px_rgba(16,185,129,0.5)]">
          <div class="bg-emerald-950 p-2 rounded-xl group-hover:bg-emerald-400/20 transition-colors">
            <i data-lucide="play" class="w-6 h-6 text-emerald-100"></i>
          </div>
          <span class="text-xl font-medium tracking-wider">進入駕駛模式</span>
        </button>

        <!-- 進入設定按鈕 -->
        <button onclick="switchView('settings')" class="group relative px-8 py-4 bg-slate-800 hover:bg-slate-700 text-white rounded-2xl flex items-center space-x-4 border border-slate-600 transition-all duration-300 shadow-lg hover:shadow-[0_0_20px_rgba(6,182,212,0.4)]">
          <div class="bg-slate-950 p-2 rounded-xl group-hover:bg-cyan-500/20 transition-colors">
            <i data-lucide="settings" class="w-6 h-6 text-cyan-400"></i>
          </div>
          <span class="text-xl font-medium tracking-wider">車輛設定與控制</span>
        </button>
      </div>
    </div>

    <!-- ==========================================
         駕駛視圖 (Drive View)
         ========================================== -->
    <div id="drive-view" class="hidden w-full h-full flex-col p-8 animate-slide-in">
      <!-- 頁面標頭 -->
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center">
          <button onclick="switchView('home')" class="p-3 bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white rounded-xl transition-colors mr-6 border border-slate-700 hover:border-slate-500">
            <i data-lucide="chevron-left" class="w-6 h-6"></i>
          </button>
          <h1 class="text-3xl font-light tracking-wider">駕駛模式 <span class="text-lg text-cyan-500 ml-2">/// 轉向系統監控</span></h1>
        </div>
        
        <!-- 藍牙連接按鈕 -->
        <button id="btn-bluetooth" onclick="connectMicrobit()" class="px-6 py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-xl flex items-center space-x-3 border border-slate-600 transition-all duration-300">
          <i data-lucide="bluetooth" id="icon-bt" class="w-5 h-5 text-slate-400"></i>
          <span id="text-bt" class="font-medium tracking-wider text-slate-300">連接 micro:bit</span>
        </button>
      </div>

      <!-- 駕駛畫面主體 (聚焦於前輪系統) -->
      <div class="flex-1 flex flex-col items-center justify-center relative">
        <!-- 俯視角車頭與雙輪系統 SVG -->
        <div id="road-environment" class="relative w-full max-w-4xl h-[500px] flex justify-center items-center mt-2 rounded-3xl overflow-hidden border border-slate-800 bg-slate-900/30">
          <svg viewBox="0 0 800 600" class="w-full h-full z-10 drop-shadow-2xl">
            <defs>
              <linearGradient id="chassisGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#e2e8f0" />
                <stop offset="30%" stop-color="#94a3b8" />
                <stop offset="100%" stop-color="#1e293b" />
              </linearGradient>
              <linearGradient id="suspensionGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#475569" />
                <stop offset="100%" stop-color="#1e293b" />
              </linearGradient>
              <linearGradient id="tireGradientTop" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#020617" />
                <stop offset="20%" stop-color="#1e293b" />
                <stop offset="80%" stop-color="#1e293b" />
                <stop offset="100%" stop-color="#020617" />
              </linearGradient>
              <linearGradient id="glowG" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.8" />
                <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.8" />
              </linearGradient>
            </defs>

            <!-- 流動路面線條 -->
            <g id="road-layer">
              <line x1="80" y1="-100" x2="80" y2="700" stroke="#334155" stroke-width="4" class="road-lines" />
              <line x1="280" y1="-100" x2="280" y2="700" stroke="#1e293b" stroke-width="2" class="road-lines" />
              <line x1="720" y1="-100" x2="720" y2="700" stroke="#334155" stroke-width="4" class="road-lines" />
              <line x1="520" y1="-100" x2="520" y2="700" stroke="#1e293b" stroke-width="2" class="road-lines" />
            </g>

            <!-- 車輛主結構 -->
            <g id="car-top-view">
              <path d="M 250 140 L 550 140 L 580 180 L 220 180 Z" fill="#0f172a" stroke="#334155" stroke-width="2" />
              <rect x="350" y="140" width="100" height="40" fill="url(#glowG)" opacity="0.6" />
              <line x1="250" y1="160" x2="550" y2="160" stroke="#06b6d4" stroke-width="2" opacity="0.8"/>
              <path d="M 380 140 L 420 140 L 450 350 L 350 350 Z" fill="url(#chassisGradient)" />
              <path d="M 330 350 L 470 350 L 500 700 L 300 700 Z" fill="url(#chassisGradient)" stroke="#475569" stroke-width="2" />

              <g id="suspension-left">
                <path d="M 360 280 L 160 250" stroke="url(#suspensionGradient)" stroke-width="12" stroke-linecap="round" />
                <path d="M 360 330 L 160 250" stroke="url(#suspensionGradient)" stroke-width="12" stroke-linecap="round" />
                <path d="M 370 240 L 160 230" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
              </g>

              <g id="suspension-right">
                <path d="M 440 280 L 640 250" stroke="url(#suspensionGradient)" stroke-width="12" stroke-linecap="round" />
                <path d="M 440 330 L 640 250" stroke="url(#suspensionGradient)" stroke-width="12" stroke-linecap="round" />
                <path d="M 430 240 L 640 230" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
              </g>

              <!-- 左前輪 -->
              <g id="steer-wheel-fl" class="steer-transition" style="transform-origin: 160px 250px;">
                <rect x="120" y="140" width="80" height="220" rx="12" fill="url(#tireGradientTop)" stroke="#0f172a" stroke-width="3"/>
                <line x1="130" y1="180" x2="190" y2="180" stroke="#0f172a" stroke-width="4"/>
                <line x1="130" y1="220" x2="190" y2="220" stroke="#0f172a" stroke-width="4"/>
                <line x1="130" y1="260" x2="190" y2="260" stroke="#0f172a" stroke-width="4"/>
                <line x1="130" y1="300" x2="190" y2="300" stroke="#0f172a" stroke-width="4"/>
                <line x1="130" y1="340" x2="190" y2="340" stroke="#0f172a" stroke-width="4"/>
                <circle cx="160" cy="250" r="10" fill="#334155" stroke="#06b6d4" stroke-width="2"/>
              </g>

              <!-- 右前輪 -->
              <g id="steer-wheel-fr" class="steer-transition" style="transform-origin: 640px 250px;">
                <rect x="600" y="140" width="80" height="220" rx="12" fill="url(#tireGradientTop)" stroke="#0f172a" stroke-width="3"/>
                <line x1="610" y1="180" x2="670" y2="180" stroke="#0f172a" stroke-width="4"/>
                <line x1="610" y1="220" x2="670" y2="220" stroke="#0f172a" stroke-width="4"/>
                <line x1="610" y1="260" x2="670" y2="260" stroke="#0f172a" stroke-width="4"/>
                <line x1="610" y1="300" x2="670" y2="300" stroke="#0f172a" stroke-width="4"/>
                <line x1="610" y1="340" x2="670" y2="340" stroke="#0f172a" stroke-width="4"/>
                <circle cx="640" cy="250" r="10" fill="#334155" stroke="#06b6d4" stroke-width="2"/>
              </g>
            </g>
          </svg>
        </div>

        <!-- 鍵盤操作提示 -->
        <div class="mt-6 bg-slate-900/80 border border-slate-700/50 backdrop-blur-md rounded-2xl p-6 shadow-2xl flex items-center space-x-6 z-20">
          <div class="flex items-center space-x-4">
            <kbd id="kbd-w" class="w-12 h-12 flex items-center justify-center bg-slate-800 border border-slate-600 rounded-lg text-xl font-bold text-white shadow-[0_4px_0_#475569] transition-all">W</kbd>
            <span class="text-slate-300 font-medium tracking-wider">前進</span>
          </div>
          <div class="w-px h-10 bg-slate-700"></div>
          <div class="flex items-center space-x-4">
            <kbd id="kbd-s" class="w-12 h-12 flex items-center justify-center bg-slate-800 border border-slate-600 rounded-lg text-xl font-bold text-white shadow-[0_4px_0_#475569] transition-all">S</kbd>
            <span class="text-slate-300 font-medium tracking-wider">後退</span>
          </div>
          <div class="w-px h-10 bg-slate-700"></div>
          <div class="flex items-center space-x-4">
            <kbd id="kbd-a" class="w-12 h-12 flex items-center justify-center bg-slate-800 border border-slate-600 rounded-lg text-xl font-bold text-white shadow-[0_4px_0_#475569] transition-all">A</kbd>
            <span class="text-slate-300 font-medium tracking-wider">左轉</span>
          </div>
          <div class="w-px h-10 bg-slate-700"></div>
          <div class="flex items-center space-x-4">
            <kbd id="kbd-d" class="w-12 h-12 flex items-center justify-center bg-slate-800 border border-slate-600 rounded-lg text-xl font-bold text-white shadow-[0_4px_0_#475569] transition-all">D</kbd>
            <span class="text-slate-300 font-medium tracking-wider">右轉</span>
          </div>
        </div>
      </div>
    </div>

    <!-- ==========================================
         設定視圖 (Settings View)
         ========================================== -->
    <div id="settings-view" class="hidden w-full h-full flex-col p-8 animate-slide-in">
      <!-- 頁面標頭 -->
      <div class="flex items-center mb-8">
        <button onclick="switchView('home')" class="p-3 bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white rounded-xl transition-colors mr-6 border border-slate-700 hover:border-slate-500">
          <i data-lucide="chevron-left" class="w-6 h-6"></i>
        </button>
        <h1 class="text-3xl font-light tracking-wider">車門與鎖定控制</h1>
      </div>

      <div class="flex-1 flex flex-row items-center justify-between px-12 pb-12">
        <!-- 左側：車輛俯視圖與動畫 -->
        <div class="flex-1 flex justify-center items-center relative">
          <div class="w-[350px] h-[600px] relative">
            <svg viewBox="-50 -100 400 800" class="w-full h-full drop-shadow-2xl overflow-visible">
              <defs>
                <linearGradient id="beamGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                  <stop offset="0%" stop-color="#fef08a" stop-opacity="0.8" />
                  <stop offset="100%" stop-color="#fef08a" stop-opacity="0" />
                </linearGradient>
              </defs>

              <rect x="75" y="45" width="150" height="510" rx="45" fill="rgba(0,0,0,0.4)" filter="blur(10px)"/>
              <rect x="85" y="150" width="130" height="280" rx="20" fill="#020617"/>
              <rect x="95" y="200" width="45" height="50" rx="8" fill="#1e293b"/>
              <rect x="160" y="200" width="45" height="50" rx="8" fill="#1e293b"/>
              <rect x="95" y="320" width="110" height="50" rx="8" fill="#1e293b"/>
              <rect x="140" y="160" width="20" height="80" rx="10" fill="#0f172a"/>

              <path d="M 100 50 L 200 50 A 30 30 0 0 1 230 80 L 230 140 L 70 140 L 70 80 A 30 30 0 0 1 100 50 Z" fill="#1e293b" stroke="#334155" stroke-width="2"/>
              <path d="M 70 420 L 230 420 L 230 520 A 30 30 0 0 1 200 550 L 100 550 A 30 30 0 0 1 70 520 Z" fill="#1e293b" stroke="#334155" stroke-width="2"/>

              <path d="M 85 145 Q 150 120 215 145 L 200 180 L 100 180 Z" fill="#0f172a" opacity="0.9" />
              <path d="M 85 415 Q 150 440 215 415 L 200 380 L 100 380 Z" fill="#0f172a" opacity="0.9" />
              <rect x="105" y="190" width="90" height="180" rx="10" fill="#0f172a" opacity="0.7"/>

              <!-- 車燈光束 (初始隱藏) -->
              <g id="headlights-beam" class="transition-opacity duration-500" style="opacity: 0;">
                <polygon points="80,60 115,50 140,-80 10,-80" fill="url(#beamGrad)" />
                <polygon points="185,50 220,60 290,-80 160,-80" fill="url(#beamGrad)" />
              </g>

              <!-- 動態車門區塊 -->
              <g id="door-g-fl" class="door-transition" style="transform-origin: 70px 150px; transform: rotate(0deg);">
                <path d="M 70 140 L 70 280 Q 55 260 70 140 Z" fill="#3b82f6" opacity="0" /> 
                <rect id="door-rect-fl" x="66" y="145" width="8" height="130" rx="4" fill="#334155" stroke="none" stroke-width="1"/>
              </g>

              <g id="door-g-fr" class="door-transition" style="transform-origin: 230px 150px; transform: rotate(0deg);">
                <rect id="door-rect-fr" x="226" y="145" width="8" height="130" rx="4" fill="#334155" stroke="none" stroke-width="1"/>
              </g>

              <g id="door-g-rl" class="door-transition" style="transform-origin: 70px 285px; transform: rotate(0deg);">
                <rect id="door-rect-rl" x="66" y="280" width="8" height="130" rx="4" fill="#334155" stroke="none" stroke-width="1"/>
              </g>

              <g id="door-g-rr" class="door-transition" style="transform-origin: 230px 285px; transform: rotate(0deg);">
                <rect id="door-rect-rr" x="226" y="280" width="8" height="130" rx="4" fill="#334155" stroke="none" stroke-width="1"/>
              </g>
            </svg>
          </div>
        </div>

        <!-- 右側：控制面板 -->
        <div class="w-[450px] bg-slate-900/80 border border-slate-700/50 backdrop-blur-md rounded-3xl p-8 shadow-2xl flex flex-col h-full max-h-[680px]">
          <h2 class="text-xl font-medium text-cyan-400 mb-4 flex items-center">
            <i data-lucide="unlock" class="w-5 h-5 mr-2"></i> 獨立車門控制
          </h2>
          
          <div class="grid grid-cols-2 gap-4 mb-6">
            <button id="btn-fl" onclick="toggleDoor('fl')" class="relative overflow-hidden p-6 rounded-2xl border transition-all duration-300 flex flex-col items-start bg-slate-800 border-slate-700 hover:border-slate-500">
              <div class="flex items-center justify-between w-full mb-2">
                <span class="text-lg font-medium text-white">左前門</span>
                <div id="indicator-fl" class="w-3 h-3 rounded-full transition-colors duration-300 bg-slate-600"></div>
              </div>
              <span id="text-fl" class="text-sm font-bold tracking-wider text-slate-400">已關閉 CLOSED</span>
            </button>
            
            <button id="btn-fr" onclick="toggleDoor('fr')" class="relative overflow-hidden p-6 rounded-2xl border transition-all duration-300 flex flex-col items-start bg-slate-800 border-slate-700 hover:border-slate-500">
              <div class="flex items-center justify-between w-full mb-2">
                <span class="text-lg font-medium text-white">右前門</span>
                <div id="indicator-fr" class="w-3 h-3 rounded-full transition-colors duration-300 bg-slate-600"></div>
              </div>
              <span id="text-fr" class="text-sm font-bold tracking-wider text-slate-400">已關閉 CLOSED</span>
            </button>

            <button id="btn-rl" onclick="toggleDoor('rl')" class="relative overflow-hidden p-6 rounded-2xl border transition-all duration-300 flex flex-col items-start bg-slate-800 border-slate-700 hover:border-slate-500">
              <div class="flex items-center justify-between w-full mb-2">
                <span class="text-lg font-medium text-white">左後門</span>
                <div id="indicator-rl" class="w-3 h-3 rounded-full transition-colors duration-300 bg-slate-600"></div>
              </div>
              <span id="text-rl" class="text-sm font-bold tracking-wider text-slate-400">已關閉 CLOSED</span>
            </button>

            <button id="btn-rr" onclick="toggleDoor('rr')" class="relative overflow-hidden p-6 rounded-2xl border transition-all duration-300 flex flex-col items-start bg-slate-800 border-slate-700 hover:border-slate-500">
              <div class="flex items-center justify-between w-full mb-2">
                <span class="text-lg font-medium text-white">右後門</span>
                <div id="indicator-rr" class="w-3 h-3 rounded-full transition-colors duration-300 bg-slate-600"></div>
              </div>
              <span id="text-rr" class="text-sm font-bold tracking-wider text-slate-400">已關閉 CLOSED</span>
            </button>
          </div>

          <h2 class="text-xl font-medium text-cyan-400 mb-4 flex items-center">
            <i data-lucide="lightbulb" class="w-5 h-5 mr-2"></i> 燈光控制
          </h2>
          
          <div class="mb-auto">
            <button id="btn-headlight" onclick="toggleHeadlight()" class="relative w-full overflow-hidden p-6 rounded-2xl border transition-all duration-300 flex flex-row items-center justify-between bg-slate-800 border-slate-700 hover:border-slate-500">
              <div class="flex items-center space-x-4">
                <div id="icon-headlight-wrapper" class="p-3 bg-slate-700 rounded-xl transition-colors duration-300">
                  <i data-lucide="lightbulb" id="icon-headlight" class="w-6 h-6 text-slate-400 transition-colors duration-300"></i>
                </div>
                <div class="flex flex-col items-start">
                  <span class="text-lg font-medium text-white mb-1">前置大燈</span>
                  <span id="text-headlight" class="text-sm font-bold tracking-wider text-slate-400">已關閉 OFF</span>
                </div>
              </div>
              <div id="indicator-headlight" class="w-3 h-3 rounded-full transition-colors duration-300 bg-slate-600"></div>
            </button>
          </div>

          <div class="border-t border-slate-800 pt-6 mt-6">
            <h2 class="text-sm font-medium text-slate-400 mb-4 tracking-wider uppercase">快捷操作</h2>
            <div class="flex space-x-4">
              <button onclick="setAllDoors(true)" class="flex-1 py-4 bg-slate-800 hover:bg-slate-700 rounded-xl font-medium transition-colors border border-slate-700 hover:border-cyan-500/50 text-cyan-400">
                全部打開
              </button>
              <button onclick="setAllDoors(false)" class="flex-1 py-4 bg-cyan-600 hover:bg-cyan-500 rounded-xl font-medium transition-colors text-white shadow-[0_0_15px_rgba(6,182,212,0.3)]">
                全部關閉
              </button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- ==========================================
       腳本區：交互邏輯控制與藍牙連線
       ========================================== -->
  <script>
    // micro:bit UART Service UUID
    const MICROBIT_UART_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const MICROBIT_UART_RX = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'; 

    // 合併後的狀態管理
    const state = {
      view: 'home',
      microbitConnected: false,
      microbitDevice: null,
      uartRxCharacteristic: null,
      headlight: false, 
      doors: {
        fl: false, // 左前
        fr: false, // 右前
        rl: false, // 左後
        rr: false  // 右後
      }
    };

    const keysPressed = { w: false, s: false, a: false, d: false };

    const doorAngles = {
      fl: 55,
      fr: -55,
      rl: 55,
      rr: -55
    };

    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      updateTime();
      setInterval(updateTime, 1000);
      renderUI();
    });

    // ==================
    // 藍牙連線與駕駛功能
    // ==================
    async function connectMicrobit() {
      if (state.microbitConnected) {
        if (state.microbitDevice && state.microbitDevice.gatt.connected) {
          state.microbitDevice.gatt.disconnect();
        }
        return;
      }

      try {
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ namePrefix: "BBC micro:bit" }],
          optionalServices: [MICROBIT_UART_SERVICE]
        });

        device.addEventListener('gattserverdisconnected', onDisconnected);
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(MICROBIT_UART_SERVICE);
        const rxCharacteristic = await service.getCharacteristic(MICROBIT_UART_RX);
        
        state.microbitDevice = device;
        state.microbitConnected = true;
        state.uartRxCharacteristic = rxCharacteristic;
        
        document.getElementById('status-driver').innerText = "駕駛者: micro:bit 已連線";
        document.getElementById('driver-status-bg').className = "flex items-center space-x-2 bg-emerald-900/50 border border-emerald-500/50 px-3 py-1 rounded-full transition-colors duration-300 text-emerald-400";

        renderUI();
      } catch (error) {
        console.error("藍牙連線失敗或被使用者取消:", error);
      }
    }

    function onDisconnected() {
      state.microbitConnected = false;
      state.microbitDevice = null;
      state.uartRxCharacteristic = null;
      
      document.getElementById('status-driver').innerText = "駕駛者: Pi Innovation";
      document.getElementById('driver-status-bg').className = "flex items-center space-x-2 bg-slate-800 px-3 py-1 rounded-full transition-colors duration-300";

      renderUI();
    }

    async function sendUARTCommand(cmd) {
      if (!state.microbitConnected || !state.uartRxCharacteristic) return;
      try {
        const encoder = new TextEncoder();
        const data = encoder.encode(cmd + '\n');
        if (state.uartRxCharacteristic.properties.writeWithoutResponse) {
          await state.uartRxCharacteristic.writeValueWithoutResponse(data);
        } else {
          await state.uartRxCharacteristic.writeValue(data);
        }
        console.log("已發送指令:", cmd);
      } catch (error) {
        console.error("發送指令失敗:", error);
      }
    }

    function updateCarState() {
      let speed = 0;
      let angle = 180;
      let sound = 0;

      if (keysPressed.w && !keysPressed.s) speed = 100;
      if (keysPressed.s && !keysPressed.w) speed = -100;

      if (keysPressed.a && !keysPressed.d) angle = 170;
      if (keysPressed.d && !keysPressed.a) angle = 190;

      const wheelFL = document.getElementById('steer-wheel-fl');
      const wheelFR = document.getElementById('steer-wheel-fr');
      const steerAngleVis = 45; 

      if (angle === 170) {
        wheelFL.style.transform = `rotate(-${steerAngleVis}deg)`;
        wheelFR.style.transform = `rotate(-${steerAngleVis}deg)`;
      } else if (angle === 190) {
        wheelFL.style.transform = `rotate(${steerAngleVis}deg)`;
        wheelFR.style.transform = `rotate(${steerAngleVis}deg)`;
      } else {
        wheelFL.style.transform = 'rotate(0deg)';
        wheelFR.style.transform = 'rotate(0deg)';
      }

      sendUARTCommand(`${angle},${speed},${sound}`);
    }

    window.addEventListener('keydown', (e) => {
      if (state.view !== 'drive') return; 
      
      const key = e.key.toLowerCase();
      const roadLayer = document.getElementById('road-layer');
      let stateChanged = false;

      if (key === 'w' && !keysPressed.w) {
        keysPressed.w = true;
        roadLayer.classList.add('road-moving-fwd');
        document.getElementById('kbd-w').classList.add('translate-y-1', 'shadow-none', 'bg-cyan-600', 'border-cyan-400');
        stateChanged = true;
      } else if (key === 's' && !keysPressed.s) {
        keysPressed.s = true;
        roadLayer.classList.add('road-moving-bwd');
        document.getElementById('kbd-s').classList.add('translate-y-1', 'shadow-none', 'bg-cyan-600', 'border-cyan-400');
        stateChanged = true;
      } else if (key === 'a' && !keysPressed.a) {
        keysPressed.a = true;
        document.getElementById('kbd-a').classList.add('translate-y-1', 'shadow-none', 'bg-cyan-600', 'border-cyan-400');
        stateChanged = true;
      } else if (key === 'd' && !keysPressed.d) {
        keysPressed.d = true;
        document.getElementById('kbd-d').classList.add('translate-y-1', 'shadow-none', 'bg-cyan-600', 'border-cyan-400');
        stateChanged = true;
      }

      if (stateChanged) updateCarState();
    });

    window.addEventListener('keyup', (e) => {
      if (state.view !== 'drive') return;
      
      const key = e.key.toLowerCase();
      const roadLayer = document.getElementById('road-layer');
      let stateChanged = false;
      
      if (key === 'w') {
        keysPressed.w = false;
        roadLayer.classList.remove('road-moving-fwd');
        document.getElementById('kbd-w').classList.remove('translate-y-1', 'shadow-none', 'bg-cyan-600', 'border-cyan-400');
        stateChanged = true;
      } else if (key === 's') {
        keysPressed.s = false;
        roadLayer.classList.remove('road-moving-bwd');
        document.getElementById('kbd-s').classList.remove('translate-y-1', 'shadow-none', 'bg-cyan-600', 'border-cyan-400');
        stateChanged = true;
      } else if (key === 'a') {
        keysPressed.a = false;
        document.getElementById('kbd-a').classList.remove('translate-y-1', 'shadow-none', 'bg-cyan-600', 'border-cyan-400');
        stateChanged = true;
      } else if (key === 'd') {
        keysPressed.d = false;
        document.getElementById('kbd-d').classList.remove('translate-y-1', 'shadow-none', 'bg-cyan-600', 'border-cyan-400');
        stateChanged = true;
      }

      if (stateChanged) updateCarState();
    });

    // ==================
    // 基礎 UI 與設定控制
    // ==================
    function updateTime() {
      const now = new Date();
      document.getElementById('clock-display').innerText = now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    function switchView(targetView) {
      state.view = targetView;
      const views = ['home-view', 'drive-view', 'settings-view'];
      
      views.forEach(v => {
        const el = document.getElementById(v);
        if (v === `${targetView}-view`) {
          el.classList.remove('hidden');
          el.classList.add('flex');
          // 重新觸發動畫
          el.classList.remove('animate-fade-in', 'animate-slide-in');
          void el.offsetWidth;
          el.classList.add(targetView === 'home' ? 'animate-fade-in' : 'animate-slide-in');
        } else {
          el.classList.add('hidden');
          el.classList.remove('flex');
        }
      });
    }

    function toggleDoor(doorKey) {
      state.doors[doorKey] = !state.doors[doorKey];
      renderUI();
    }

    function toggleHeadlight() {
      state.headlight = !state.headlight;
      renderUI();
    }

    function setAllDoors(isOpen) {
      state.doors = { fl: isOpen, fr: isOpen, rl: isOpen, rr: isOpen };
      renderUI();
    }

    function renderUI() {
      // 1. 更新藍牙按鈕狀態
      const btnBt = document.getElementById('btn-bluetooth');
      const textBt = document.getElementById('text-bt');
      const iconBt = document.getElementById('icon-bt');

      if (btnBt && textBt && iconBt) {
        if (state.microbitConnected) {
          btnBt.className = "px-6 py-3 bg-cyan-900/40 hover:bg-cyan-800/60 text-white rounded-xl flex items-center space-x-3 border border-cyan-500/50 transition-all duration-300 shadow-[0_0_15px_rgba(6,182,212,0.3)]";
          iconBt.className = "w-5 h-5 text-cyan-400";
          textBt.className = "font-medium tracking-wider text-cyan-100";
          textBt.innerText = "斷開 micro:bit";
        } else {
          btnBt.className = "px-6 py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-xl flex items-center space-x-3 border border-slate-600 transition-all duration-300";
          iconBt.className = "w-5 h-5 text-slate-400";
          textBt.className = "font-medium tracking-wider text-slate-300";
          textBt.innerText = "連接 micro:bit";
        }
      }

      // 2. 更新車門狀態 UI
      Object.keys(state.doors).forEach(key => {
        const isOpen = state.doors[key];
        const doorGroup = document.getElementById(`door-g-${key}`);
        const doorRect = document.getElementById(`door-rect-${key}`);
        
        if (doorGroup && doorRect) {
          const angle = isOpen ? doorAngles[key] : 0;
          doorGroup.style.transform = `rotate(${angle}deg)`;
          
          doorRect.setAttribute('fill', isOpen ? '#06b6d4' : '#334155');
          if (isOpen) {
            doorRect.setAttribute('stroke', '#22d3ee');
          } else {
            doorRect.removeAttribute('stroke');
          }
        }

        const btn = document.getElementById(`btn-${key}`);
        const text = document.getElementById(`text-${key}`);
        const indicator = document.getElementById(`indicator-${key}`);

        if (btn && text && indicator) {
          if (isOpen) {
            btn.className = "relative overflow-hidden p-6 rounded-2xl border transition-all duration-300 flex flex-col items-start bg-cyan-900/30 border-cyan-500/50 shadow-[0_0_15px_rgba(6,182,212,0.15)]";
            text.className = "text-sm font-bold tracking-wider text-cyan-400";
            text.innerText = "已打開 OPEN";
            indicator.className = "w-3 h-3 rounded-full transition-colors duration-300 bg-cyan-400 shadow-[0_0_8px_#22d3ee]";
          } else {
            btn.className = "relative overflow-hidden p-6 rounded-2xl border transition-all duration-300 flex flex-col items-start bg-slate-800 border-slate-700 hover:border-slate-500";
            text.className = "text-sm font-bold tracking-wider text-slate-400";
            text.innerText = "已關閉 CLOSED";
            indicator.className = "w-3 h-3 rounded-full transition-colors duration-300 bg-slate-600";
          }
        }
      });

      // 3. 更新車燈狀態 UI
      const beam = document.getElementById('headlights-beam');
      const btnHl = document.getElementById('btn-headlight');
      const textHl = document.getElementById('text-headlight');
      const iconHlWrapper = document.getElementById('icon-headlight-wrapper');
      const iconHl = document.getElementById('icon-headlight');
      const indicatorHl = document.getElementById('indicator-headlight');

      if (beam && btnHl) {
        if (state.headlight) {
          beam.style.opacity = '1';
          btnHl.className = "relative w-full overflow-hidden p-6 rounded-2xl border transition-all duration-300 flex flex-row items-center justify-between bg-yellow-900/20 border-yellow-500/50 shadow-[0_0_15px_rgba(253,224,71,0.15)]";
          iconHlWrapper.className = "p-3 bg-yellow-500/20 rounded-xl transition-colors duration-300";
          iconHl.classList.remove('text-slate-400');
          iconHl.classList.add('text-yellow-400');
          textHl.className = "text-sm font-bold tracking-wider text-yellow-400";
          textHl.innerText = "已開啟 ON";
          indicatorHl.className = "w-3 h-3 rounded-full transition-colors duration-300 bg-yellow-400 shadow-[0_0_8px_#facc15]";
        } else {
          beam.style.opacity = '0';
          btnHl.className = "relative w-full overflow-hidden p-6 rounded-2xl border transition-all duration-300 flex flex-row items-center justify-between bg-slate-800 border-slate-700 hover:border-slate-500";
          iconHlWrapper.className = "p-3 bg-slate-700 rounded-xl transition-colors duration-300";
          iconHl.classList.add('text-slate-400');
          iconHl.classList.remove('text-yellow-400');
          textHl.className = "text-sm font-bold tracking-wider text-slate-400";
          textHl.innerText = "已關閉 OFF";
          indicatorHl.className = "w-3 h-3 rounded-full transition-colors duration-300 bg-slate-600";
        }
      }
    }
  </script>
